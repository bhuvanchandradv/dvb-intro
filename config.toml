baseURL       = "https://bhuvanchandradv.github.io/"
languageCode  = "en-us"
title         = "Bhuvan Chandra DV"
theme         = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  author        = "Bhuvan Chandra DV"
  description   = "Senior Embedded Systems Engineer — Linux, Zephyr RTOS, Robotics"
  defaultTheme  = "dark"
  ShowReadingTime   = true
  ShowShareButtons  = false
  ShowPostNavLinks  = true
  ShowBreadCrumbs   = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true

  [params.homeInfoParams]
    Title = "Hi, I'm Bhuvan Chandra."
    Content = """Senior Systems Engineer specialising in Mechatronics and Embedded Systems, based in Tokyo. \
I work at [Rapyuta Robotics](https://www.rapyuta-robotics.com/) on autonomous warehouse robotics — across \
the full embedded stack, from real-time firmware and motor control to system architecture and reliability engineering.\n\n\
I'm on a trajectory toward Systems Architecture: thinking about how complex robotic systems fit together at scale, \
and increasingly interested in developer tooling and AI-assisted workflows that make embedded teams more effective.\n\n\
Before Tokyo, I built my foundation at [Toradex](https://www.toradex.com/) working across industrial embedded platforms \
and communication protocols — and picked up upstream [Linux kernel](https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/log/?qt=author&q=bhuvanchandra.dv) \
and [U-Boot](http://git.denx.de/?p=u-boot.git&a=search&h=refs%2Fheads%2Fmaster&st=author&s=bhuvanchandra.dv) \
contributions along the way. That background in real hardware constraints — timing, memory, determinism — still shapes \
how I approach every problem.\n\n\
I write about embedded systems, robotics, real-time OS internals, and the craft of building reliable systems in production."""

