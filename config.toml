baseURL       = "https://bhuvanchandradv.github.io/"
languageCode  = "en-us"
title         = "Bhuvan Chandra DV"
theme         = "terminal"

[pagination]
  pagerSize = 10

[params]
  # Terminal theme specific
  themeColor    = "orange"   # orange, pink, red, blue, green
  fullWidthTheme = false
  centerTheme   = true
  autoCover     = false
  readMore      = false
  showMenuItems = 4
  enableDarkMode = true

  contentTypeName = "blog"
  dateFormat      = "2006-01-02"

  [params.logo]
    logoText      = "bhuvan@tokyo:~$"
    logoHomeLink  = "/"

  description = "Senior Systems Engineer — Mechatronics, Embedded Systems & Robotics"

[languages]
  [languages.en]
    title    = "Bhuvan Chandra DV"
    subtitle = "Senior Systems Engineer — Embedded Systems, Real-Time OS, Robotics"
    owner    = "Bhuvan Chandra DV"
    keywords = "embedded systems, linux, zephyr, rtos, robotics, mechatronics"
    copyright = ""
    menuMore  = "more"
    readMore  = "read more"
    readOtherPosts = "read other posts"
    newerPosts     = "newer"
    olderPosts     = "older"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "back to home"
    minuteReadingTime = "min read"
    words = "words"

    [languages.en.params.logo]
      logoText     = "bhuvan@tokyo:~$"
      logoHomeLink = "/"

    [[languages.en.menu.main]]
      identifier = "about"
      name       = "about"
      url        = "/about"
      weight     = 1
    [[languages.en.menu.main]]
      identifier = "blog"
      name       = "blog"
      url        = "/blog"
      weight     = 2
    [[languages.en.menu.main]]
      identifier = "tags"
      name       = "tags"
      url        = "/tags"
      weight     = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]
